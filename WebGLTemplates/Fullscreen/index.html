<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{{{ PRODUCT_NAME }}}</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html, body {
  overflow: hidden;
  background: #0f0f0f;
  width: 100%;
  height: 100%;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

#unity-canvas {
  width: 100vw;
  height: 100vh;
  display: block;
}

/* ── LOADING SCREEN ── */
#loading-screen {
  position: fixed;
  inset: 0;
  background: linear-gradient(160deg, #e8f4fd 0%, #d0eaff 40%, #c5f0e8 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 10;
  overflow: hidden;
  transition: opacity 0.8s ease;
}

/* ── SKY GRADIENT DRIFT ── */
#loading-screen::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(255,255,255,0.6) 0%, transparent 60%),
              radial-gradient(ellipse 60% 80% at 80% 70%, rgba(186,230,253,0.5) 0%, transparent 60%),
              radial-gradient(ellipse 70% 50% at 50% 90%, rgba(167,243,208,0.4) 0%, transparent 50%);
  animation: skyDrift 12s ease-in-out infinite alternate;
}

@keyframes skyDrift {
  0%   { transform: translate(0%, 0%) scale(1); }
  33%  { transform: translate(-3%, 2%) scale(1.04); }
  66%  { transform: translate(3%, -2%) scale(0.97); }
  100% { transform: translate(-1%, 3%) scale(1.02); }
}

/* ── CLOUDS ── */
.cloud {
  position: absolute;
  background: rgba(255, 255, 255, 0.75);
  border-radius: 50px;
  filter: blur(1px);
  animation: cloudFloat linear infinite;
  will-change: transform;
}

.cloud::before,
.cloud::after {
  content: '';
  position: absolute;
  background: inherit;
  border-radius: 50%;
}

.cloud-1  { width: 180px; height: 50px; top: 12%; animation-duration: 28s; animation-delay: 0s;   opacity: 0.80; }
.cloud-2  { width: 120px; height: 36px; top: 22%; animation-duration: 22s; animation-delay: -8s;  opacity: 0.65; }
.cloud-3  { width: 260px; height: 65px; top: 6%;  animation-duration: 35s; animation-delay: -14s; opacity: 0.55; }
.cloud-4  { width: 90px;  height: 28px; top: 70%; animation-duration: 19s; animation-delay: -5s;  opacity: 0.50; }
.cloud-5  { width: 200px; height: 55px; top: 80%; animation-duration: 31s; animation-delay: -20s; opacity: 0.60; }
.cloud-6  { width: 140px; height: 40px; top: 55%; animation-duration: 25s; animation-delay: -11s; opacity: 0.45; }
.cloud-7  { width: 310px; height: 75px; top: 42%; animation-duration: 40s; animation-delay: -3s;  opacity: 0.35; }
.cloud-8  { width: 80px;  height: 24px; top: 33%; animation-duration: 17s; animation-delay: -16s; opacity: 0.55; }

.cloud-1::before  { width: 80px;  height: 80px;  top: -50px; left: 25px; }
.cloud-1::after   { width: 60px;  height: 60px;  top: -35px; left: 80px; }
.cloud-2::before  { width: 55px;  height: 55px;  top: -34px; left: 18px; }
.cloud-2::after   { width: 40px;  height: 40px;  top: -24px; left: 54px; }
.cloud-3::before  { width: 110px; height: 110px; top: -68px; left: 40px; }
.cloud-3::after   { width: 80px;  height: 80px;  top: -50px; left: 120px; }
.cloud-4::before  { width: 40px;  height: 40px;  top: -24px; left: 12px; }
.cloud-4::after   { width: 30px;  height: 30px;  top: -18px; left: 38px; }
.cloud-5::before  { width: 90px;  height: 90px;  top: -55px; left: 35px; }
.cloud-5::after   { width: 65px;  height: 65px;  top: -40px; left: 100px; }
.cloud-6::before  { width: 62px;  height: 62px;  top: -38px; left: 20px; }
.cloud-6::after   { width: 48px;  height: 48px;  top: -30px; left: 64px; }
.cloud-7::before  { width: 130px; height: 130px; top: -80px; left: 55px; }
.cloud-7::after   { width: 100px; height: 100px; top: -62px; left: 150px; }
.cloud-8::before  { width: 36px;  height: 36px;  top: -22px; left: 10px; }
.cloud-8::after   { width: 26px;  height: 26px;  top: -16px; left: 34px; }

@keyframes cloudFloat {
  from { transform: translateX(-120%); }
  to   { transform: translateX(110vw); }
}

/* ── FLOATING PARTICLES ── */
.particle {
  position: absolute;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.9);
  animation: particleRise linear infinite;
  will-change: transform, opacity;
}

@keyframes particleRise {
  0%   { transform: translateY(0)      translateX(0);     opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 0.6; }
  100% { transform: translateY(-100vh) translateX(20px);  opacity: 0; }
}

/* ── CENTER CARD ── */
#loading-card {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  padding: 48px 56px 44px;
  background: rgba(255, 255, 255, 0.55);
  border: 1px solid rgba(255, 255, 255, 0.9);
  border-radius: 28px;
  backdrop-filter: blur(20px) saturate(1.4);
  -webkit-backdrop-filter: blur(20px) saturate(1.4);
  box-shadow:
    0 8px 40px rgba(100, 170, 220, 0.18),
    0 2px 8px  rgba(100, 170, 220, 0.10),
    inset 0 1px 0 rgba(255,255,255,0.8);
  animation: cardBreathe 6s ease-in-out infinite;
}

@keyframes cardBreathe {
  0%, 100% { transform: translateY(0px);   box-shadow: 0 8px 40px rgba(100,170,220,0.18), 0 2px 8px rgba(100,170,220,0.10), inset 0 1px 0 rgba(255,255,255,0.8); }
  50%       { transform: translateY(-6px);  box-shadow: 0 18px 56px rgba(100,170,220,0.26), 0 4px 16px rgba(100,170,220,0.14), inset 0 1px 0 rgba(255,255,255,0.8); }
}

/* ── LOGO ── */
#logo {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #2d6a9f;
  text-shadow: 0 1px 0 rgba(255,255,255,0.8);
  animation: logoShimmer 4s ease-in-out infinite;
}

@keyframes logoShimmer {
  0%, 100% { opacity: 1;    letter-spacing: 3px; }
  50%       { opacity: 0.75; letter-spacing: 4px; }
}

/* ── SPINNER ── */
#spinner-wrap {
  position: relative;
  width: 56px;
  height: 56px;
}

.ring {
  position: absolute;
  inset: 0;
  border-radius: 50%;
  border: 3px solid transparent;
}

.ring-outer {
  border-top-color: #56b4e0;
  border-right-color: #56b4e0;
  animation: spinCW 1.8s linear infinite;
}

.ring-middle {
  inset: 8px;
  border-top-color: #78d8c8;
  border-left-color: #78d8c8;
  animation: spinCCW 1.2s linear infinite;
}

.ring-inner {
  inset: 16px;
  border-top-color: #a7c4e8;
  animation: spinCW 0.9s linear infinite;
}

@keyframes spinCW  { to { transform: rotate(360deg);  } }
@keyframes spinCCW { to { transform: rotate(-360deg); } }

/* ── PROGRESS ── */
#progress-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  width: 220px;
}

#progress-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #6eaad0;
}

#progress-track {
  width: 100%;
  height: 5px;
  background: rgba(150, 200, 230, 0.3);
  border-radius: 10px;
  overflow: hidden;
}

#progress-bar {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #56b4e0, #78d8c8, #a7e8da);
  background-size: 200% 100%;
  border-radius: 10px;
  transition: width 0.25s ease;
  animation: barShine 2s linear infinite;
}

@keyframes barShine {
  0%   { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}

/* ── DOTS INDICATOR ── */
#dots {
  display: flex;
  gap: 7px;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #78c8e0;
  animation: dotPulse 1.4s ease-in-out infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes dotPulse {
  0%, 80%, 100% { transform: scale(1);   opacity: 0.5; }
  40%           { transform: scale(1.5); opacity: 1; }
}

/* ── HIDE ── */
.hidden {
  opacity: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div id="loading-screen">

  <!-- drifting clouds -->
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>
  <div class="cloud cloud-5"></div>
  <div class="cloud cloud-6"></div>
  <div class="cloud cloud-7"></div>
  <div class="cloud cloud-8"></div>

  <!-- rising particles (generated by JS below) -->
  <div id="particles"></div>

  <!-- center card -->
  <div id="loading-card">
    <div id="logo">Please wait a moment</div>

    <div id="spinner-wrap">
      <div class="ring ring-outer"></div>
      <div class="ring ring-middle"></div>
      <div class="ring ring-inner"></div>
    </div>

    <div id="progress-wrap">
      <div id="progress-track">
        <div id="progress-bar"></div>
      </div>
      <div id="progress-label">Loading</div>
    </div>

    <div id="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

</div>

<canvas id="unity-canvas"></canvas>

<script src="Build/{{{ LOADER_FILENAME }}}"></script>

<script>
// ── particles ──
(function () {
  const container = document.getElementById('particles');
  const COUNT = 22;
  for (let i = 0; i < COUNT; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 3 + Math.random() * 6;
    p.style.cssText = [
      'width:'  + size + 'px',
      'height:' + size + 'px',
      'left:'   + (Math.random() * 100) + '%',
      'bottom:' + (-size) + 'px',
      'animation-duration:' + (6 + Math.random() * 12) + 's',
      'animation-delay:'    + (-Math.random() * 14)    + 's',
      'opacity: 0'
    ].join(';');
    container.appendChild(p);
  }
})();

// ── unity ──
const canvas       = document.querySelector('#unity-canvas');
const loadingScreen = document.getElementById('loading-screen');
const progressBar  = document.getElementById('progress-bar');
const progressLabel = document.getElementById('progress-label');

// Disable Unity's built-in fullscreen-on-click/tap behavior.
canvas.requestFullscreen        = () => Promise.resolve();
canvas.webkitRequestFullscreen  = () => {};
canvas.mozRequestFullScreen     = () => {};
canvas.msRequestFullscreen      = () => {};

const isMobile   = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
const dpr = window.devicePixelRatio || 1;
const longestSide = Math.max(window.innerWidth, window.innerHeight);
const renderScale = isMobile ? 0.6 : Math.min(dpr, 2560 / longestSide);

createUnityInstance(canvas, {
  dataUrl:           'Build/{{{ DATA_FILENAME }}}',
  frameworkUrl:      'Build/{{{ FRAMEWORK_FILENAME }}}',
  codeUrl:           'Build/{{{ CODE_FILENAME }}}',
  streamingAssetsUrl:'StreamingAssets',
  companyName:       '{{{ COMPANY_NAME }}}',
  productName:       '{{{ PRODUCT_NAME }}}',
  productVersion:    '{{{ PRODUCT_VERSION }}}',
  devicePixelRatio:  renderScale
}, (progress) => {
  const pct = Math.round(progress * 100);
  progressBar.style.width  = pct + '%';
  progressLabel.textContent = pct < 100 ? 'Loading ' + pct + '%' : 'Ready';
}).then(() => {
  loadingScreen.classList.add('hidden');
  setTimeout(() => { loadingScreen.style.display = 'none'; }, 800);
});
</script>

</body>
</html>
